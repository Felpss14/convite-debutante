<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <h1>Meus 15 anos</h1>
    <p>Rebeca</p>

<section id="hero">Carrossel</section>

<div class="carrossel">
  <input type="radio" name="slide" id="slide1" checked>
  <input type="radio" name="slide" id="slide2">
  <input type="radio" name="slide" id="slide3">

  <div class="slides">
    <div class="slide s1">
      <img src="img1.jpg" alt="Imagem 1">
    </div>
    <div class="slide">
      <img src="img2.jpg" alt="Imagem 2">
    </div>
    <div class="slide">
      <img src="img3.jpg" alt="Imagem 3">
    </div>
  </div>

  <div class="navegacao">
    <label for="slide1"></label>
    <label for="slide2"></label>
    <label for="slide3"></label>
  </div>
</div>

<section id="contagem">Contagem Regressiva</section>

<section id="informações">Informações</section>

<section id="confirmacao">Confirmação</section>

<section class="mapa">
  <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3651.665444674713!2d-46.843992625546655!3d-23.759306868892626!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94cfb2c375e8fb21%3A0x22d2c79ba4fbdfb3!2sEspa%C3%A7o%20Month%C3%AAz%20Eventos%20-%20Buffet%20%26%20Casamento%20no%20Campo!5e0!3m2!1sen!2sbr!4v1777039476288!5m2!1sen!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
